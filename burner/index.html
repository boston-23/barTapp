}

<script>
const STATE = {
  tickets: {},
  currentFilter: 'all',
  scanning: false,
  frozen: false,
  videoStream: null,
  loaded: false,
  cameraFacing: localStorage.getItem('cameraFacing') || 'environment',
  deviceName: localStorage.getItem('deviceName') || ''
};

// ============== UTILS ==============
function toast(msg, duration = 2200) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), duration);
}
function fmtDate(ts) {
  if (!ts) return '-';
  const d = new Date(ts);
  return d.toLocaleString('it-IT', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
}
function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function setSyncStatus(state) {
  document.getElementById('sync-dot').className = 'sync-indicator ' + state;
}
function setDeviceName(name) {
  STATE.deviceName = name.trim();
  localStorage.setItem('deviceName', STATE.deviceName);
  toast('✅ Nome salvato');
}

// ============== FIREBASE ==============
function startFirebaseSync() {
  const fb = window.firebase;
  if (!fb) return;
  fb.onSnapshot(fb.ticketsCol, (snapshot) => {
    snapshot.docChanges().forEach((change) => {
      const data = change.doc.data();
      if (change.type === 'removed') delete STATE.tickets[change.doc.id];
      else STATE.tickets[change.doc.id] = data;
    });
    if (!STATE.loaded) {
      STATE.loaded = true;
      document.getElementById('splash').style.display = 'none';
      // Auto-start scanner once loaded
      autoStartScanner();
    }
    setSyncStatus('online');
    updateStats();
    if (document.getElementById('info-panel').classList.contains('open')) renderTicketList();
  }, (error) => {
    console.error('Sync error:', error);
    setSyncStatus('offline');
    if (!STATE.loaded) {
      STATE.loaded = true;
      document.getElementById('splash').style.display = 'none';
      toast('❌ Errore: ' + error.code, 5000);
    }
  });
}

async function atomicBurnTicket(id, deviceName) {
  const fb = window.firebase;
  if (!fb) throw new Error('Firebase not ready');
  const ref = fb.doc(fb.db, 'tickets', id);
  return await fb.runTransaction(fb.db, async (transaction) => {
    const docSnap = await transaction.get(ref);
    if (!docSnap.exists()) return { success: false, reason: 'not_found' };
    const ticket = docSnap.data();
    if (ticket.usedAt) return { success: false, reason: 'already_used', ticket };
    const now = Date.now();
    transaction.update(ref, { usedAt: now, usedBy: deviceName || 'unknown' });
    return { success: true, ticket: { ...ticket, usedAt: now, usedBy: deviceName } };
  });
}

// ============== SCANNER ==============
async function autoStartScanner() {
  // Try to autostart unless first run blocked by browser permissions (then user can press the button)
  // We don't request the permission proactively because it would prompt on every page load;
  // we prompt only when user taps Avvia. So just leave the placeholder if not started yet.
}

async function startScanner() {
  if (STATE.scanning) return;
  const video = document.getElementById('scanner-video');
  try {
    STATE.videoStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: STATE.cameraFacing }
    });
    video.srcObject = STATE.videoStream;
    await video.play();
    STATE.scanning = true;
    STATE.frozen = false;

    document.getElementById('scanner-placeholder').style.display = 'none';
    video.style.display = 'block';
    document.getElementById('scanner-overlay').style.display = 'block';
    document.getElementById('scanner-hint').style.display = 'block';
    document.getElementById('camera-switch-btn').style.display = 'flex';
    document.getElementById('scanner-zone').classList.remove('frozen');

    requestAnimationFrame(scanLoop);
  } catch(e) {
    console.error(e);
    toast('❌ Fotocamera non accessibile. Verifica i permessi.', 4000);
  }
}

async function switchCamera() {
  STATE.cameraFacing = STATE.cameraFacing === 'environment' ? 'user' : 'environment';
  localStorage.setItem('cameraFacing', STATE.cameraFacing);
  toast(STATE.cameraFacing === 'environment' ? '📷 Fotocamera posteriore' : '🤳 Fotocamera frontale');

  // Restart with new camera
  if (STATE.videoStream) {
    STATE.videoStream.getTracks().forEach(t => t.stop());
    STATE.videoStream = null;
  }
  STATE.scanning = false;
  STATE.frozen = false;
  await startScanner();
}

function freezeScanner() {
  STATE.frozen = true;
  document.getElementById('scanner-zone').classList.add('frozen');
  document.getElementById('scanner-hint').style.display = 'none';
}

function resumeScanner() {
  STATE.frozen = false;
  document.getElementById('scanner-zone').classList.remove('frozen');
  document.getElementById('scanner-hint').style.display = 'block';
  document.getElementById('result-panel').className = 'result-panel empty';
  document.getElementById('result-panel').innerHTML = '';
}

function scanLoop() {
  if (!STATE.scanning) return;
  if (STATE.frozen) {
    requestAnimationFrame(scanLoop);
    return;
  }
  const video = document.getElementById('scanner-video');
  const canvas = document.getElementById('scanner-canvas');
  if (video.readyState === video.HAVE_ENOUGH_DATA) {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const code = jsQR(imageData.data, imageData.width, imageData.height);
    if (code && code.data) {
      freezeScanner();
      validateTicket(code.data);
    }
  }
  requestAnimationFrame(scanLoop);
}

function getOrderSiblings(ticket) {
  if (!ticket.orderId) return [];
  return Object.values(STATE.tickets).filter(t => t.orderId === ticket.orderId);
}

function showResult(type, html) {
  const panel = document.getElementById('result-panel');
  panel.className = 'result-panel';
  panel.innerHTML = `<div class="result-card ${type}">${html}</div>`;
}

async function validateTicket(rawCode) {
  const code = rawCode.trim().toUpperCase();
  const ticket = STATE.tickets[code];

  try { if (navigator.vibrate) navigator.vibrate(80); } catch(e) {}

  // QR sconosciuto
  if (!ticket) {
    showResult('error', `
      <div class="result-title">❌ QR NON RICONOSCIUTO</div>
      <div class="result-meta"><code>${escapeHtml(code)}</code></div>
      <div class="actions">
        <button class="btn-big btn-resume" onclick="resumeScanner()">↻ RIPRENDI SCAN</button>
      </div>
    `);
    if (navigator.vibrate) navigator.vibrate([100, 50, 100, 50, 100]);
    return;
  }

  const siblings = getOrderSiblings(ticket);
  const siblingsUsed = siblings.filter(s => s.usedAt).length;
  const siblingsTotal = siblings.length || 1;
  const orderProgress = siblingsTotal > 1
    ? `<div class="result-meta">Ordine: ${siblingsUsed}/${siblingsTotal} drink usati</div>`
    : '';

  const indexBadge = ticket.orderTotal > 1
    ? `<span class="index-badge">${ticket.orderIndex}/${ticket.orderTotal}</span>`
    : '';

  // Già usato
  if (ticket.usedAt) {
    const usedByInfo = ticket.usedBy && ticket.usedBy !== 'unknown'
      ? ` da ${escapeHtml(ticket.usedBy)}` : '';
    showResult('warning', `
      <div class="result-title">⚠️ GIÀ USATO</div>
      <div class="result-name">${escapeHtml(ticket.name)}${indexBadge}</div>
      ${orderProgress}
      <div class="result-meta">Bruciato il ${fmtDate(ticket.usedAt)}${usedByInfo}</div>
      <div class="actions">
        <button class="btn-big btn-resume" onclick="resumeScanner()">↻ RIPRENDI SCAN</button>
      </div>
    `);
    if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
    return;
  }

  // Valido — pronto da bruciare
  showResult('success', `
    <div class="result-title">✅ VALIDO</div>
    <div class="result-name">${escapeHtml(ticket.name)}${indexBadge}</div>
    ${orderProgress}
    ${ticket.notes ? `<div class="result-meta"><em>${escapeHtml(ticket.notes)}</em></div>` : ''}
    <div class="actions">
      <button class="btn-big btn-burn" onclick="confirmBurn('${ticket.id}')">🔥 BRUCIA</button>
      <button class="btn-big btn-resume" onclick="resumeScanner()">Annulla</button>
    </div>
  `);
  if (navigator.vibrate) navigator.vibrate(200);
}

async function confirmBurn(id) {
  document.querySelectorAll('.btn-big').forEach(b => b.disabled = true);
  try {
    const result = await atomicBurnTicket(id, STATE.deviceName || 'unknown');

    if (!result.success) {
      if (result.reason === 'already_used') {
        const t = result.ticket;
        const usedByInfo = t.usedBy && t.usedBy !== 'unknown' ? ` da ${escapeHtml(t.usedBy)}` : '';
        showResult('warning', `
          <div class="result-title">⚠️ GIÀ BRUCIATO ALTROVE</div>
          <div class="result-name">${escapeHtml(t.name)}</div>
          <div class="result-meta">${fmtDate(t.usedAt)}${usedByInfo}</div>
          <div class="actions">
            <button class="btn-big btn-resume" onclick="resumeScanner()">↻ RIPRENDI SCAN</button>
          </div>
        `);
        if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 200]);
      } else {
        showResult('error', `
          <div class="result-title">❌ TICKET NON TROVATO</div>
          <div class="actions">
            <button class="btn-big btn-resume" onclick="resumeScanner()">↻ RIPRENDI SCAN</button>
          </div>
        `);
      }
      return;
    }

    const ticket = result.ticket;
    const siblings = getOrderSiblings(ticket);
    const remaining = siblings.filter(s => !s.usedAt).length;
    const remainingMsg = ticket.orderTotal > 1
      ? `<div class="result-meta">Restano ${remaining}/${ticket.orderTotal} drink per ${escapeHtml(ticket.name)}</div>`
      : '<div class="result-meta">Drink consegnato</div>';

    const indexBadge = ticket.orderTotal > 1
      ? `<span class="index-badge">${ticket.orderIndex}/${ticket.orderTotal}</span>`
      : '';

    showResult('success', `
      <div class="result-title">🔥 BRUCIATO!</div>
      <div class="result-name">${escapeHtml(ticket.name)}${indexBadge}</div>
      ${remainingMsg}
    `);
    if (navigator.vibrate) navigator.vibrate([100, 50, 100, 50, 300]);
    updateStats();

    setTimeout(() => {
      if (STATE.scanning) resumeScanner();
    }, 1500);
  } catch(e) {
    console.error(e);
    showResult('error', `
      <div class="result-title">❌ ERRORE</div>
      <div class="result-meta">${escapeHtml(e.message)}</div>
      <div class="actions">
        <button class="btn-big btn-resume" onclick="resumeScanner()">↻ RIPRENDI</button>
      </div>
    `);
  }
}

function manualValidate() {
  const code = document.getElementById('manual-code').value.trim().toUpperCase();
  if (!code) return;
  closeInfoPanel();
  if (STATE.scanning) freezeScanner();
  validateTicket(code);
  document.getElementById('manual-code').value = '';
}

// ============== INFO PANEL (sheet) ==============
function openInfoPanel() {
  document.getElementById('info-panel').classList.add('open');
  renderTicketList();
}
function closeInfoPanel() {
  document.getElementById('info-panel').classList.remove('open');
}

function updateStats() {
  const tickets = Object.values(STATE.tickets);
  const used = tickets.filter(t => t.usedAt).length;
  document.getElementById('stat-total').textContent = tickets.length;
  document.getElementById('stat-valid').textContent = tickets.length - used;
  document.getElementById('stat-used').textContent = used;
}

function filterTickets(filter, btn) {
  STATE.currentFilter = filter;
  document.querySelectorAll('.filter-bar button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTicketList();
}

function renderTicketList() {
  const list = document.getElementById('ticket-list');
  const search = document.getElementById('search-tickets').value.toLowerCase();
  let tickets = Object.values(STATE.tickets);
  if (STATE.currentFilter === 'valid') tickets = tickets.filter(t => !t.usedAt);
  if (STATE.currentFilter === 'used') tickets = tickets.filter(t => t.usedAt);
  if (search) {
    tickets = tickets.filter(t =>
      t.id.toLowerCase().includes(search) ||
      (t.name || '').toLowerCase().includes(search) ||
      (t.orderId || '').toLowerCase().includes(search)
    );
  }
  if (tickets.length === 0) {
    list.innerHTML = '<div style="text-align:center;color:#64748b;padding:30px;">Nessun ticket</div>';
    return;
  }
  const groups = {};
  tickets.forEach(t => {
    const key = t.orderId || 'NO-ORDER-' + t.id;
    if (!groups[key]) groups[key] = [];
    groups[key].push(t);
  });
  const sortedKeys = Object.keys(groups).sort((a, b) => {
    const aMax = Math.max(...groups[a].map(t => t.usedAt || t.createdAt));
    const bMax = Math.max(...groups[b].map(t => t.usedAt || t.createdAt));
    return bMax - aMax;
  });
  list.innerHTML = sortedKeys.map(key => {
    const group = groups[key].sort((a, b) => (a.orderIndex || 0) - (b.orderIndex || 0));
    const first = group[0];
    const usedCount = group.filter(t => t.usedAt).length;
    const totalCount = first.orderTotal || group.length;
    return `
      <div class="order-group">
        <div class="order-header">
          <div class="order-name">${escapeHtml(first.name)}</div>
          <span class="order-count">${usedCount}/${totalCount}</span>
        </div>
        ${group.map(t => `
          <div class="ticket-row ${t.usedAt ? 'used' : 'valid'}" ${!t.usedAt ? `onclick="quickValidate('${t.id}')"` : ''}>
            <div>
              <div class="ticket-meta">
                ${t.id}${t.orderTotal > 1 ? ` • ${t.orderIndex}/${t.orderTotal}` : ''}
                ${t.usedAt ? ' • ' + fmtDate(t.usedAt) + (t.usedBy && t.usedBy !== 'unknown' ? ' (' + escapeHtml(t.usedBy) + ')' : '') : ''}
              </div>
            </div>
            <span class="ticket-status ${t.usedAt ? 'used' : 'valid'}">${t.usedAt ? 'USATO' : 'OK'}</span>
          </div>
        `).join('')}
      </div>
    `;
  }).join('');
}

// Tap on a valid ticket in the info panel = open it as if scanned
function quickValidate(id) {
  closeInfoPanel();
  if (STATE.scanning) freezeScanner();
  validateTicket(id);
}

// ============== EXPOSE ==============
window.startScanner = startScanner;
window.switchCamera = switchCamera;
window.resumeScanner = resumeScanner;
window.confirmBurn = confirmBurn;
window.manualValidate = manualValidate;
window.openInfoPanel = openInfoPanel;
window.closeInfoPanel = closeInfoPanel;
window.filterTickets = filterTickets;
window.renderTicketList = renderTicketList;
window.quickValidate = quickValidate;
window.setDeviceName = setDeviceName;

document.getElementById('device-name-input').value = STATE.deviceName;

if (window.firebaseReady) {
  startFirebaseSync();
} else if (window.firebaseError) {
  document.getElementById('splash').style.display = 'none';
  setSyncStatus('offline');
  toast('❌ ' + window.firebaseError, 6000);
} else {
  window.addEventListener('firebase-ready', startFirebaseSync);
  window.addEventListener('firebase-error', () => {
    document.getElementById('splash').style.display = 'none';
    setSyncStatus('offline');
    toast('❌ ' + (window.firebaseError || 'Modulo non caricato'), 6000);
  });
  setTimeout(() => {
    if (!STATE.loaded && !window.firebaseError) {
      document.getElementById('splash').style.display = 'none';
      setSyncStatus('offline');
      toast('❌ Timeout — apri la console (F12) per dettagli', 6000);
    }
  }, 8000);
}
</script>
