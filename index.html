<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎟️ Drink Ticket System</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .container { max-width: 500px; width: 100%; text-align: center; }
  h1 { font-size: 28px; margin-bottom: 8px; }
  .subtitle { color: #94a3b8; margin-bottom: 32px; font-size: 14px; }
  .app-card {
    display: block;
    text-decoration: none;
    padding: 24px;
    border-radius: 14px;
    margin-bottom: 12px;
    color: white;
    transition: transform 0.1s;
  }
  .app-card:active { transform: scale(0.98); }
  .app-card.generator { background: linear-gradient(135deg, #7c3aed 0%, #ec4899 100%); }
  .app-card.burner { background: linear-gradient(135deg, #dc2626 0%, #ea580c 100%); }
  .app-card .icon { font-size: 40px; margin-bottom: 8px; }
  .app-card h2 { font-size: 22px; margin-bottom: 6px; }
  .app-card p { opacity: 0.9; font-size: 14px; }
</style>
</head>
<body>
  <div class="container">
    <h1>🎟️ Drink Ticket</h1>
    <p class="subtitle">Sistema gestione ticket con QR</p>

    <a href="generator/" class="app-card generator">
      <div class="icon">➕</div>
      <h2>Generatore</h2>
      <p>Crea nuovi ticket • Carica liste Excel • Stampa PDF</p>
    </a>

    <a href="burner/" class="app-card burner">
      <div class="icon">🔥</div>
      <h2>Burner</h2>
      <p>Scansiona QR e brucia ticket al bar</p>
    </a>
  </div>
</body>
</html>
